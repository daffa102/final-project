<!DOCTYPE html>
<html lang="id">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Aplikasi kasir dan manajemen keuangan toko Anda.">

  <!-- PWA installable on Android & iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kash">
  <meta name="application-name" content="Kash">
  <meta name="msapplication-TileColor" content="#111727">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Kash - Kasir & Keuangan</title>
  <link rel="manifest" href="manifest.json">

  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">

  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #111727;
      background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #111727;
      }
    }

    /* PWA Install Banner */
    #pwa-install-banner {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #1e2d4a, #111727);
      color: white;
      padding: 16px 20px;
      z-index: 99999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
      border-top: 1px solid rgba(255,255,255,0.1);
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #pwa-install-banner.show {
      display: flex;
    }
    #pwa-install-banner .banner-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    #pwa-install-banner img {
      width: 48px;
      height: 48px;
      border-radius: 10px;
    }
    #pwa-install-banner .banner-text strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
    }
    #pwa-install-banner .banner-text span {
      font-size: 12px;
      opacity: 0.75;
    }
    #pwa-install-banner .banner-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #pwa-install-btn {
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    #pwa-dismiss-btn {
      background: transparent;
      color: rgba(255,255,255,0.6);
      border: none;
      padding: 10px;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  <script src="flutter_bootstrap.js" async=""></script>

  <!-- PWA Install Banner -->
  <div id="pwa-install-banner">
    <div class="banner-info">
      <img src="icons/Icon-192.png" alt="Kash">
      <div class="banner-text">
        <strong>Install Kash di HP Anda</strong>
        <span>Akses lebih cepat seperti aplikasi native</span>
      </div>
    </div>
    <div class="banner-actions">
      <button id="pwa-install-btn">Install</button>
      <button id="pwa-dismiss-btn">✕</button>
    </div>
  </div>

  <script>
    // Register Service Worker untuk PWA offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('flutter_service_worker.js?v=1').then(function(registration) {
          console.log('ServiceWorker registered:', registration.scope);
        }).catch(function(err) {
          console.log('ServiceWorker registration failed:', err);
        });
      });
    }

    // PWA Install Prompt
    let deferredPrompt = null;
    const banner = document.getElementById('pwa-install-banner');
    const installBtn = document.getElementById('pwa-install-btn');
    const dismissBtn = document.getElementById('pwa-dismiss-btn');

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      // Tampilkan banner setelah 3 detik
      setTimeout(function() {
        if (!localStorage.getItem('pwa-dismissed')) {
          banner.classList.add('show');
        }
      }, 3000);
    });

    installBtn.addEventListener('click', async function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('PWA install outcome:', outcome);
      deferredPrompt = null;
      banner.classList.remove('show');
    });

    dismissBtn.addEventListener('click', function() {
      banner.classList.remove('show');
      localStorage.setItem('pwa-dismissed', '1');
    });

    window.addEventListener('appinstalled', function() {
      banner.classList.remove('show');
      deferredPrompt = null;
      console.log('Kash telah diinstall!');
    });
  </script>
</body>
</html>

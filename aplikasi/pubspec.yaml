name: aplikasi
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.0
  path_provider: ^2.1.2
  dio: ^5.8.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.25
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.5
  fl_chart: ^0.70.2
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  permission_handler: ^11.4.0
  geolocator: ^13.0.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  image_picker: ^1.1.2
  provider: ^6.1.1
  pdf: ^3.11.1
  printing: ^5.13.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.1.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  share_plus: ^10.1.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.24.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    # Onboarding assets (~13 KB total, excluding the 499KB Figma export)
    - lib/assets/Ellipse 18.svg
    - lib/assets/Vector.svg
    - lib/assets/Vector (1).svg
    - lib/assets/Vector.png
    - lib/assets/FIRST.svg
    - lib/assets/FIRST (1).svg
    - lib/assets/FIRST (2).svg
    - lib/assets/FIRST (3).svg
    - lib/assets/Kash..svg
    - lib/assets/spinner.json
    # Content wrapper.svg (499KB) intentionally excluded — login built as Flutter widgets
    # progress_activity.svg excluded — replaced by spinner.json

flutter_native_splash:
  color: "#111727"
  image: lib/assets/Vector.png
  color_dark: "#111727"
  image_dark: lib/assets/Vector.png
  android_12:
    image: lib/assets/Vector.png
    color: "#111727"
    image_dark: lib/assets/Vector.png
    color_dark: "#111727"

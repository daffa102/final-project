name: Deploy Laravel via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Deploy Website
    runs-on: ubuntu-latest

    steps:
    - name: 📂 Get Latest Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2 # Hanya butuh history terbaru untuk diff FTP

    - name: 💿 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🔨 Build Frontend Assets (Vite)
      run: |
        cd final-project
        npm ci
        npm run build

    - name: 📝 Create .env for Production
      run: |
        cat > final-project/.env << 'ENVEOF'
        APP_NAME=Kash
        APP_ENV=production
        APP_KEY=${{ secrets.APP_KEY }}
        APP_DEBUG=false
        APP_URL=${{ secrets.APP_URL }}

        LOG_CHANNEL=stack
        LOG_STACK=single
        LOG_LEVEL=error

        DB_CONNECTION=mysql
        DB_HOST=${{ secrets.DB_HOST }}
        DB_PORT=3306
        DB_DATABASE=${{ secrets.DB_DATABASE }}
        DB_USERNAME=${{ secrets.DB_USERNAME }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}

        SESSION_DRIVER=file
        SESSION_LIFETIME=120
        SESSION_ENCRYPT=false
        SESSION_PATH=/
        SESSION_DOMAIN=null

        CACHE_STORE=file
        QUEUE_CONNECTION=sync
        FILESYSTEM_DISK=local

        MAIL_MAILER=log
        VITE_APP_NAME=Kash
        ENVEOF

    - name: 🚫 Remove files that should not be deployed
      run: |
        rm -f final-project/.gitignore
        rm -f final-project/.git-ftp-ignore
        rm -f final-project/phpunit.xml
        rm -f final-project/vite.config.js
        rm -f final-project/package.json
        rm -f final-project/package-lock.json
        rm -rf final-project/node_modules
        rm -rf final-project/tests
        rm -f final-project/test_auth.php
        rm -f final-project/test_curl.php
        rm -f final-project/test_guard.php
        rm -f final-project/test.txt

    - name: 📂 Sync Files to Server via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        local-dir: ./final-project/
        server-dir: /
        exclude: |
          **/.git*
          **/node_modules/**
          **/vendor/**
          **/tests/**
          **/.idea/**
          **/.vscode/**

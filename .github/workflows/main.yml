name: Deploy Laravel via FTP

on:
  push:
    branches:
      - main # Jalankan otomatis saat Anda push ke branch main

jobs:
  web-deploy:
    name: 🚀 Deploy Website
    runs-on: ubuntu-latest

    steps:
    - name: 📂 Get Latest Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Penting agar FTP Action hanya mengunggah file yang berubah

    - name: 💿 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🔨 Build Frontend Assets (Vite)
      run: |
        cd final-project
        npm install
        npm run build

    # Opsi Tambahan: Jika hosting Anda TIDAK memiliki SSH/Composer,
    # hapus tanda '#' di 3 baris di bawah ini untuk menginstal vendor di GitHub dan mengunggahnya:
    # - name: 📦 Install Composer Dependencies
    #   run: |
    #     cd final-project
    #     composer install --no-dev --optimize-autoloader --no-interaction

    - name: 📂 Sync Files to Server via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        local-dir: ./final-project/
        server-dir: / # Sesuaikan dengan root hosting Anda (misal: /public_html/ atau /)

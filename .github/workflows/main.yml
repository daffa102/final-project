name: Deploy Laravel via FTP

on:
  push:
    branches:
      - main # Jalankan otomatis saat Anda push ke branch main

jobs:
  web-deploy:
    name: 🚀 Deploy Website
    runs-on: ubuntu-latest

    steps:
    - name: 📂 Get Latest Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Penting agar FTP Action hanya mengunggah file yang berubah

    - name: 💿 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🔨 Build Frontend Assets (Vite)
      run: |
        cd final-project
        npm install
        npm run build

    - name: 📦 Install Composer Dependencies
      run: |
        cd final-project
        composer install --no-dev --optimize-autoloader --no-interaction

    - name: 📝 Create .env for Production
      run: |
        cd final-project
        echo "APP_NAME=Kash" > .env
        echo "APP_ENV=production" >> .env
        echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
        echo "APP_DEBUG=false" >> .env
        echo "APP_URL=${{ secrets.APP_URL }}" >> .env
        echo "" >> .env
        echo "LOG_CHANNEL=stack" >> .env
        echo "LOG_STACK=single" >> .env
        echo "LOG_LEVEL=error" >> .env
        echo "" >> .env
        echo "DB_CONNECTION=mysql" >> .env
        echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
        echo "DB_PORT=3306" >> .env
        echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
        echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
        echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
        echo "" >> .env
        echo "SESSION_DRIVER=file" >> .env
        echo "SESSION_LIFETIME=120" >> .env
        echo "SESSION_ENCRYPT=false" >> .env
        echo "SESSION_PATH=/" >> .env
        echo "SESSION_DOMAIN=null" >> .env
        echo "" >> .env
        echo "CACHE_STORE=file" >> .env
        echo "QUEUE_CONNECTION=sync" >> .env
        echo "FILESYSTEM_DISK=local" >> .env
        echo "" >> .env
        echo "MAIL_MAILER=log" >> .env
        echo "VITE_APP_NAME=Kash" >> .env

    - name: 📂 Sync Files to Server via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        local-dir: ./final-project/
        server-dir: / # Sesuaikan dengan root hosting Anda (misal: /public_html/ atau /)

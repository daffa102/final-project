name: Deploy Laravel + Flutter Web via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: 📂 Get Latest Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    # ── Build Laravel Frontend Assets ──────────────────────────────────────
    - name: 💿 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🔨 Build Frontend Assets (Vite)
      run: |
        cd final-project
        npm install
        npm run build

    # ── Build Flutter Web ──────────────────────────────────────────────────
    - name: 💿 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.1'
        channel: 'stable'
        cache: true

    - name: 📦 Get Flutter dependencies
      run: |
        cd aplikasi
        flutter pub get

    - name: 🌐 Build Flutter Web
      run: |
        cd aplikasi
        flutter build web --release --base-href "/app/"

    # ── Copy Flutter build output ke Laravel public/app ───────────────────
    - name: 📋 Copy Flutter web build to Laravel public/app
      run: |
        rm -rf final-project/public/app
        mkdir -p final-project/public/app
        cp -r aplikasi/build/web/. final-project/public/app/

    # ── Cleanup files that should not be deployed ─────────────────────────
    - name: 🚫 Remove files that should not be deployed
      run: |
        rm -f final-project/.gitignore
        rm -f final-project/.git-ftp-ignore
        rm -f final-project/phpunit.xml
        rm -f final-project/vite.config.js
        rm -f final-project/package.json
        rm -rf final-project/node_modules
        rm -rf final-project/tests
        rm -f final-project/test_auth.php
        rm -f final-project/test_curl.php
        rm -f final-project/test_guard.php
        rm -f final-project/test.txt

    # ── Deploy Laravel + Flutter ke Server via FTP ────────────────────────
    - name: 📂 Sync Files to Server via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        local-dir: ./final-project/
        server-dir: /
        exclude: |
          **/.git*
          **/.env
          **/node_modules/**
          **/vendor/**
          **/tests/**
          **/.idea/**
          **/.vscode/**
